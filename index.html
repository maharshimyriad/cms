<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Manager - CMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hero Header -->
  <header>
    <div class="container">
      <h1>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6-6 6 6M6 9h12M6 9v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9" />
        </svg>
        Product Manager
      </h1>
      <p class="header-subtitle">Browse our collection of products</p>
    </div>
  </header>

  <div class="container">
    <!-- Error Message -->
    <div id="error-message" role="alert"></div>

    <!-- Loading State -->
    <div id="loading" class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading products...</p>
    </div>

    <!-- Main Content (hidden while loading) -->
    <div id="main-content" style="display: none;">
      <!-- Controls Section -->
      <div class="section">
        <div class="top-controls">
          <!-- Search -->
          <div class="search-input-wrapper">
            <input
              type="text"
              id="search-input"
              placeholder="Search products..."
              aria-label="Search products"
            >
          </div>

          <!-- Category Filter -->
          <select id="category-filter" aria-label="Filter by category">
            <option value="all">All Categories</option>
          </select>

          <!-- Sort -->
          <select id="sort-select" aria-label="Sort by">
            <option value="name-asc">Sort: Name (A-Z)</option>
            <option value="name-desc">Sort: Name (Z-A)</option>
            <option value="price-asc">Sort: Price (Low-High)</option>
            <option value="price-desc">Sort: Price (High-Low)</option>
          </select>

          <!-- View Toggle -->
          <select id="view-toggle" aria-label="View type">
            <option value="cards">View: Cards</option>
            <option value="table">View: Table</option>
          </select>

          <!-- Admin Link -->
          <a href="admin.html" class="btn btn-secondary">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 15.5c1.93 0 3.5-1.57 3.5-3.5S13.93 8.5 12 8.5s-3.5 1.57-3.5 3.5 1.57 3.5 3.5 3.5zM12 21v-6M6 3h12M3 3h18v3H3z" />
            </svg>
            Admin Panel
          </a>
        </div>
      </div>

      <!-- Items Container -->
      <div class="section">
        <div id="items-container" class="items-grid">
          <!-- Items populated dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="github-api.js"></script>
  
  <!-- Configure default GitHub repo here (optional) -->
  <script>
    window.CMS_DEFAULT_OWNER = 'maharshimyriad';
    window.CMS_DEFAULT_REPO = 'cms';
  </script>
  
  <script src="app.js"></script>
</body>
</html>
